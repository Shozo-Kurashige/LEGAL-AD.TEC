kind = "web"
previewPath = "/"
title = "りこんほっとLINE AI相談デモ"
version = "1.0.0"
id = "artifacts/chat-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21696

[services.development]
run = "pnpm --filter @workspace/chat-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat-demo", "run", "build" ]
publicDir = "artifacts/chat-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21696"
BASE_PATH = "/"
